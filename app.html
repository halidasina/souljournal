*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100vh;}
body{font-family:'Inter',sans-serif;background:#fff;color:#1A1A1A;}
input[type=range]{width:100%;height:5px;border-radius:100px;border:none;appearance:none;-webkit-appearance:none;background:linear-gradient(to right,#D4A89A,#C4975A,#7A8C6E);outline:none;padding:0;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#1A1A1A;border:2px solid #C4975A;cursor:pointer;}
.cause-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.cause-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#FAFAF8;border-radius:10px;border:1.5px solid rgba(0,0,0,.08);cursor:pointer;transition:all .18s;font-family:inherit;text-align:left;}
.cause-btn.sel{border-color:#C4975A;background:rgba(196,151,90,.06);}
.cause-box{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cause-btn.sel .cause-box{background:#C4975A;border-color:#C4975A;}
.mood-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0;}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 12px;border-radius:12px;border:1.5px solid rgba(0,0,0,.08);background:#fff;cursor:pointer;transition:all .18s;font-family:inherit;}
.mood-btn.sel{border-color:#C4975A;background:rgba(196,151,90,.07);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.fade{animation:fadeUp .35s ease both;}
.adm-table{width:100%;border-collapse:collapse;}
.adm-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#9A9A9A;text-align:left;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.06);}
.adm-table td{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px;color:#1A1A1A;vertical-align:middle;}
.adm-table tr:hover td{background:rgba(196,151,90,.03);}

/* CHANGE PASSWORD MODAL */
function ChangePwModal({buyer, onClose}) {
  const [oldPw,setOldPw]=useState(""); const [newPw,setNewPw]=useState(""); const [confPw,setConfPw]=useState("");
  const [err,setErr]=useState(""); const [done,setDone]=useState(false);
  const submit=()=>{
    setErr("");
    if(!oldPw||!newPw||!confPw){setErr("Please fill in all fields.");return;}
    if(oldPw.trim().toLowerCase()!==buyer.password.toLowerCase()){setErr("Current password is incorrect.");return;}
    if(newPw.trim().length<6){setErr("New password must be at least 6 characters.");return;}
    if(newPw.trim()!==confPw.trim()){setErr("New passwords do not match.");return;}
    if(newPw.trim().toLowerCase()===oldPw.trim().toLowerCase()){setErr("New password must be different.");return;}
    try{
      const buyers=JSON.parse(localStorage.getItem(BUYERS_KEY)||"[]");
      const updated=buyers.map(b=>b.id===buyer.id?{...b,password:newPw.trim()}:b);
      localStorage.setItem(BUYERS_KEY,JSON.stringify(updated));
      buyer.password=newPw.trim();
      setDone(true);
    }catch(e){setErr("Error saving. Please try again.");}
  };
  const ov={position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:24};
  const box={background:C.white,borderRadius:20,padding:"32px 28px",maxWidth:380,width:"100%"};
  return(
    <div style={ov} onClick={onClose}>
      <div style={box} onClick={e=>e.stopPropagation()}>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:300,color:C.ink,marginBottom:4}}>Change <em style={{fontStyle:"italic",color:C.gold}}>Password</em></h2>
        <p style={{fontSize:12,color:C.muted,marginBottom:24,fontFamily:"'DM Mono',monospace"}}>SOUL JOURNAL - ACCOUNT SECURITY</p>
        {!done ? <>
          {err&&<div style={{padding:"10px 14px",background:"rgba(200,50,50,.08)",border:"1px solid rgba(200,50,50,.2)",borderRadius:8,fontSize:12,color:"#cc4444",marginBottom:14}}>{err}</div>}
          <label style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>CURRENT PASSWORD</label>
          <input style={{...S.inp,marginBottom:14}} type="password" placeholder="Enter current password..." value={oldPw} onChange={e=>{setOldPw(e.target.value);setErr("");}}/>
          <label style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>NEW PASSWORD</label>
          <input style={{...S.inp,marginBottom:14}} type="password" placeholder="Min. 6 characters..." value={newPw} onChange={e=>{setNewPw(e.target.value);setErr("");}}/>
          <label style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>CONFIRM NEW PASSWORD</label>
          <input style={{...S.inp,marginBottom:20}} type="password" placeholder="Re-enter new password..." value={confPw} onChange={e=>{setConfPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          <div style={{display:"flex",gap:10}}>
            <button style={{...S.btnOut,...S.btnSm,flex:1,justifyContent:"center"}} onClick={onClose}>Cancel</button>
            <button style={{...S.btnDark,...S.btnSm,flex:2,justifyContent:"center"}} onClick={submit}>Update Password</button>
          </div>
        </> : <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,color:C.ink,marginBottom:8}}>Password Updated!</h3>
          <p style={{fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.7}}>Use your new password next time you sign in.</p>
          <div style={{background:C.warm,borderRadius:12,padding:"10px 16px",fontFamily:"'DM Mono',monospace",fontSize:12,color:C.mid,border:"1px solid rgba(196,151,90,.15)"}}>
            New password: <strong style={{color:C.goldD}}>{newPw}</strong>
          </div>
          <button style={{...S.btnGold,marginTop:20,justifyContent:"center",width:"100%"}} onClick={onClose}>Done</button>
        </div>}
      </div>
    </div>
  );
}

/* ADMIN */
function Admin({onLogout}) {
  const [buyers,setBuyers]=useState([]);
  const [search,setSearch]=useState("");
  const [name,setName]=useState(""); const [email,setEmail]=useState(""); const [pw,setPw]=useState(genPW());
  const [toast,setToast]=useState(""); const [cfm,setCfm]=useState(null);
  useEffect(()=>{setBuyers(sget(BUYERS_KEY)||[]);},[]);
  const save=list=>{setBuyers(list);sset(BUYERS_KEY,list);};
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),3000);};
  const addBuyer=()=>{
    if(!name.trim()||!pw.trim()) return;
    save([...buyers,{id:genId(),name:name.trim(),email:email.trim(),password:pw.trim(),createdAt:today(),active:true}]);
    setName(""); setEmail(""); setPw(genPW()); showToast("Buyer added!");
  };
  const toggle=id=>save(buyers.map(b=>b.id===id?{...b,active:!b.active}:b));
  const resetPw=id=>{const p=genPW();save(buyers.map(b=>b.id===id?{...b,password:p}:b));showToast("New password: "+p);};
  const del=id=>{save(buyers.filter(b=>b.id!==id));setCfm(null);showToast("Buyer removed.");};
  const copy=p=>{try{navigator.clipboard.writeText(p);}catch{}showToast("Copied: "+p);};
  const shown=buyers.filter(b=>b.name.toLowerCase().includes(search.toLowerCase())||b.password.toLowerCase().includes(search.toLowerCase()));
  const active=buyers.filter(b=>b.active).length;
  const inp={width:"100%",padding:"10px 13px",background:C.off,border:"1px solid rgba(0,0,0,.1)",borderRadius:10,color:C.ink,fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};
  return(
    <div style={{minHeight:"100vh",background:C.off}}>
      <div style={{background:C.white,borderBottom:"1px solid rgba(0,0,0,.06)",padding:"14px 24px",display:"flex",alignItems:"center",gap:12}}>
        <Logo size={32}/>
        <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontStyle:"italic",color:C.ink}}>Soul Journal</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:C.white,background:C.ink,padding:"3px 10px",borderRadius:100}}>ADMIN</span>
        <div style={{marginLeft:"auto"}}>
          <button style={{...S.btnOut,...S.btnSm}} onClick={onLogout}>Sign Out</button>
        </div>
      </div>
      <div style={{maxWidth:960,margin:"0 auto",padding:"32px 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
          {[["Total Buyers",buyers.length,C.gold],["Active",active,C.sage],["Inactive",buyers.length-active,C.muted],["Revenue","$"+(buyers.length*10).toFixed(0),C.goldD]].map(([l,n,col])=>(
            <div key={l} style={{background:C.white,border:"1px solid rgba(0,0,0,.08)",borderRadius:14,padding:18,textAlign:"center"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,color:col,lineHeight:1}}>{n}</div>
              <div style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:4}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{background:C.white,border:"1px solid rgba(0,0,0,.08)",borderRadius:16,padding:24,marginBottom:24}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:3,color:C.muted,marginBottom:16}}>ADD NEW BUYER</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:12,alignItems:"end"}}>
            <div><label style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>NAME</label><input style={inp} placeholder="Buyer name..." value={name} onChange={e=>setName(e.target.value)}/></div>
            <div><label style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>EMAIL (OPTIONAL)</label><input style={inp} placeholder="email@example.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
            <div><label style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:2,color:C.muted,marginBottom:6,display:"block"}}>PASSWORD <span style={{cursor:"pointer",color:C.gold}} onClick={()=>setPw(genPW())}>refresh</span></label><input style={{...inp,fontFamily:"'DM Mono',monospace",letterSpacing:1}} value={pw} onChange={e=>setPw(e.target.value)}/></div>
            <button style={{...S.btnDark,...S.btnSm}} onClick={addBuyer} disabled={!name.trim()||!pw.trim()}>+ Add</button>
          </div>
        </div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:3,color:C.muted,marginBottom:14}}>ALL BUYERS ({buyers.length})</div>
        <input style={{...inp,marginBottom:16,background:C.white}} placeholder="Search name or password..." value={search} onChange={e=>setSearch(e.target.value)}/>
        {shown.length===0
          ? <div style={{textAlign:"center",padding:"48px 24px",color:C.muted}}>{buyers.length===0?"No buyers yet. Add your first buyer above!":"No results found."}</div>
          : <div style={{background:C.white,border:"1px solid rgba(0,0,0,.08)",borderRadius:16,overflow:"hidden"}}>
              <table className="adm-table">
                <thead><tr><th>NAME</th><th>PASSWORD</th><th>DATE</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
                <tbody>{shown.map(b=>(
                  <tr key={b.id}>
                    <td><div style={{fontWeight:600}}>{b.name}</div>{b.email&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{b.email}</div>}</td>
                    <td><button style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.gold,background:"rgba(196,151,90,.1)",padding:"4px 10px",borderRadius:6,cursor:"pointer",border:"none"}} onClick={()=>copy(b.password)}>{b.password}</button></td>
                    <td style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:C.muted}}>{fmtShort(b.createdAt)}</td>
                    <td><span style={{background:b.active?"rgba(122,140,110,.1)":"rgba(0,0,0,.06)",color:b.active?C.sage:C.muted,fontSize:10,padding:"3px 10px",borderRadius:100,fontFamily:"'DM Mono',monospace"}}>{b.active?"Active":"Inactive"}</span></td>
                    <td><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {[["Copy PW","rgba(196,151,90,.1)",C.goldD,()=>copy(b.password)],["Reset PW","rgba(91,138,139,.1)",C.teal,()=>resetPw(b.id)],[b.active?"Deactivate":"Activate","rgba(0,0,0,.05)",C.muted,()=>toggle(b.id)],["Remove","rgba(200,50,50,.08)","#cc4444",()=>setCfm({id:b.id,name:b.name})]].map(([l,bg,col,fn])=>(
                        <button key={l} style={{background:bg,color:col,border:"none",fontSize:10,padding:"5px 10px",borderRadius:8,cursor:"pointer"}} onClick={fn}>{l}</button>
                      ))}
                    </div></td>

        headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,
          messages:[{role:"user",content:"You are a compassionate Islamic spiritual mentor. Analyse these journal entries from "+mlbl(sel)+" and provide a meaningful reflection in English.\n\nJOURNAL ENTRIES:\n"+lines+"\n\nRespond in this format (no markdown):\n\nTHIS MONTHS REFLECTION\n[2-3 sentences about their spiritual journey]\n\nPATTERNS OBSERVED\n[2-3 emotional patterns]\n\nYOUR STRENGTHS\n[2-3 positive observations]\n\nGUIDANCE FOR NEXT MONTH\n[2-3 Islamic suggestions]\n\nCLOSING DUA\n[A relevant verse or hadith with brief commentary]"}]
        })
      });
      const data=await r.json();
      if(data.error){setErr("API error: "+data.error.message);setBusy(false);return;}
      const txt=(data.content||[]).map(b=>b.text||"").join("");
      if(!txt) throw new Error("No response");
      onSave(sel,{text:txt,generated:new Date().toISOString(),count:me.length});
    }catch(e){setErr("Error: "+(e.message||"Please try again."));}
    setBusy(false);
  };
  const fmt=txt=>txt.split(/\n(?=[A-Z][A-Z])/).filter(Boolean).map((s,i)=>{
    const ls=s.trim().split("\n"); const h=ls[0]; const b=ls.slice(1).join("\n").trim();
    return<div key={i} style={{marginBottom:20}}>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:C.gold,marginBottom:8}}>{h}</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.85)",lineHeight:1.9}}>{b.split("\n").map((l,j)=><p key={j} style={{marginBottom:6}}>{l}</p>)}</div>
    </div>;
  });
  return(<div className="fade">
    <div style={S.page}>
      <div style={S.pgTitle}>AI <em style={{fontStyle:"italic",color:C.gold}}>Reflection</em></div>
      <span style={S.pgSub}>Monthly soul analysis</span>
      {months.length===0
        ?<div style={{textAlign:"center",padding:"48px 24px",color:C.muted}}><div style={{fontSize:48,marginBottom:12}}>✨</div><p>No entries yet.<br/>Begin writing to unlock AI reflection.</p></div>
        :<>
          <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:20,scrollbarWidth:"none"}}>
            {months.map(m=><button key={m} style={{padding:"7px 16px",borderRadius:100,fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,border:sel===m?"none":"1px solid rgba(0,0,0,.08)",background:sel===m?C.ink:C.off,color:sel===m?C.white:C.muted}} onClick={()=>setSel(m)}>{mlbl(m)}</button>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            {[[me.length,"ENTRIES",C.gold],[me.filter(([,e])=>e.g1||e.g2||e.g3).length,"GRATITUDE",C.sage],[me.filter(([,e])=>e.mood==="😊"||e.mood==="🙂").length,"POSITIVE",C.blush]].map(([n,l,col])=>(
              <div key={l} style={{background:C.off,borderRadius:14,padding:16,textAlign:"center",border:"1px solid rgba(0,0,0,.06)"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,color:col,lineHeight:1}}>{n}</div>
                <div style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:4}}>{l}</div>
              </div>
            ))}
          </div>
          {!ex&&!busy&&<div style={{...S.card,textAlign:"center"}}>
            <div style={{...S.tag,marginBottom:8}}>GENERATE AI REFLECTION</div>
            <p style={{fontSize:13,color:C.muted,marginBottom:16}}>{me.length} entries for {mlbl(sel)}.</p>
            <button style={S.btnDark} onClick={gen} disabled={!me.length}>Generate Reflection</button>
            {err&&<p style={{fontSize:12,color:"#cc4444",marginTop:10}}>{err}</p>}
          </div>}
          {busy&&<div style={{background:C.ink,borderRadius:18,padding:24,marginBottom:14}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:C.gold,marginBottom:8}}>ANALYSING YOUR JOURNEY...</div>
            <p style={{fontSize:13,color:"rgba(255,255,255,.6)"}}>Reading {me.length} entries...</p>
          </div>}
          {ex&&!busy&&<>
            <div style={{background:C.ink,borderRadius:18,padding:24,marginBottom:14,position:"relative",overflow:"hidden"}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:3,color:C.gold,marginBottom:8}}>REFLECTION FOR {mlbl(sel).toUpperCase()} - {ex.count} ENTRIES</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.8)",lineHeight:1.9}}>{fmt(ex.text)}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <button style={{...S.btnOut,...S.btnSm}} onClick={()=>onSave(sel,null)}>Regenerate</button>
              <div style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:10}}>Generated: {new Date(ex.generated).toLocaleDateString("en-US")}</div>
            </div>
          </>}
        </>}
    </div>
    {showPw&&<ChangePwModal buyer={buyer} onClose={()=>setShowPw(false)}/>}
    <Footer onLogout={onLogout} onChangePw={()=>setShowPw(true)}/>
  </div>);
}

/* SPLASH */
function Splash({buyer,entries,onStart,onLogout}) {
  return(
    <div style={{minHeight:"100vh",background:C.ink,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40,textAlign:"center",position:"relative",overflow:"hidden"}}>
      <button style={{position:"absolute",top:24,right:24,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:100,padding:"7px 16px",fontSize:11,color:"rgba(255,255,255,.4)",cursor:"pointer",fontFamily:"'DM Mono',monospace"}} onClick={onLogout}>Sign Out</button>
      <div style={{position:"relative",zIndex:1}}>
        <p style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:4,color:C.gold,marginBottom:20}}>DAILY REFLECTION - MUHASABAH</p>
        <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(52px,12vw,76px)",fontWeight:300,color:C.white,lineHeight:1.05,marginBottom:8}}>Soul <em style={{fontStyle:"italic",color:C.goldL}}>Journal</em></h1>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontStyle:"italic",color:"rgba(255,255,255,.4)",marginBottom:8}}>by Hati Sedar</p>
        <div style={{width:40,height:1,background:C.gold,margin:"24px auto"}}/>
        <p style={{fontSize:14,color:"rgba(255,255,255,.5)",maxWidth:280,lineHeight:1.8,margin:"0 auto 36px"}}>A sacred space for daily reflection, gratitude, and drawing closer to Allah.</p>
        <button style={{...S.btnGold,fontSize:15,padding:"15px 48px"}} onClick={onStart}>{Object.keys(entries).length>0?"Continue Reflecting":"Begin Your Journey"}</button>
        <p style={{fontSize:13,color:"rgba(255,255,255,.3)",marginTop:16,fontFamily:"'DM Mono',monospace"}}>Welcome, {buyer ? buyer.name : ""}</p>
      </div>
    </div>
  );
}

/* NAV */
function Nav({page,setPage,saveSt,onLogout}) {
  const TABS=[{id:"home",l:"Home",e:"🏠"},{id:"daily",l:"Daily",e:"☀️"},{id:"history",l:"History",e:"📖"},{id:"reflection",l:"AI",e:"✨"}];
  return(
    <div style={{background:C.white,borderBottom:"1px solid rgba(0,0,0,.06)",display:"flex",alignItems:"center",overflowX:"auto",scrollbarWidth:"none",position:"sticky",top:0,zIndex:100}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontStyle:"italic",color:C.ink,padding:"0 18px 0 20px",borderRight:"1px solid rgba(0,0,0,.06)",flexShrink:0}}>
        Soul <span style={{color:C.gold}}>Journal</span>
      </div>
      {TABS.map(t=>(
        <button key={t.id} style={{padding:"15px 14px",fontSize:10,color:page===t.id?C.ink:C.muted,cursor:"pointer",whiteSpace:"nowrap",border:"none",borderBottom:page===t.id?"2px solid "+C.gold:"2px solid transparent",background:"none",fontFamily:"'DM Mono',monospace",letterSpacing:"1.5px",textTransform:"uppercase",flexShrink:0}} onClick={()=>setPage(t.id)}>
          {t.e} {t.l}
        </button>
      ))}
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,paddingRight:14,flexShrink:0}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:1,color:saveSt==="saved"?C.sage:C.gold}}>{saveSt==="saving"?"saving...":"saved"}</div>
        <button style={{background:"none",border:"1px solid rgba(0,0,0,.1)",borderRadius:100,padding:"5px 12px",fontSize:9,color:C.muted,cursor:"pointer",fontFamily:"'DM Mono',monospace"}} onClick={onLogout}>Sign Out</button>
      </div>
    </div>
  );
}

/* APP */
function App() {
  const [view,setView]   = useState("gate");
  const [buyer,setBuyer] = useState(null);
  const [page,setPage]   = useState("home");
  const [entries,setE]   = useState({});
  const [summs,setSumms] = useState({});
  const [saveSt,setSaveSt] = useState("saved");
  const timer = useRef(null);

  useEffect(()=>{
    const s=JSON.parse(sessionStorage.getItem(SESSION_KEY)||"null");
    if(s && s.buyerId){
      const buyers=sgetBuyers();
      const b=buyers.find(x=>x.id===s.buyerId&&x.active);
      if(b){setBuyer(b);loadJ(b.id);setView("splash");}
    }
  },[]);

  const loadJ=id=>{
    setE(sget(JOURNAL_PRE+"e_"+id)||{});
    setSumms(sget(JOURNAL_PRE+"s_"+id)||{});
  };
  const handleBuyer=b=>{
    setBuyer(b);
    sessionStorage.setItem(SESSION_KEY,JSON.stringify({buyerId:b.id}));
    loadJ(b.id); setView("splash");
  };
  const logout=()=>{
    sessionStorage.removeItem(SESSION_KEY);
    setBuyer(null); setE({}); setSumms({});
    setView("gate"); setPage("home");
  };
  const saveEntry=useCallback((date,data)=>{
    if(!buyer) return;
    setE(prev=>{
      const next={...prev,[date]:data};
      setSaveSt("saving");
      if(timer.current) clearTimeout(timer.current);
      timer.current=setTimeout(()=>{sset(JOURNAL_PRE+"e_"+buyer.id,next);setSaveSt("saved");},700);
      return next;
    });
  },[buyer]);
  const saveSumm=useCallback((month,data)=>{
    if(!buyer) return;
    setSumms(prev=>{
      const next=data?{...prev,[month]:data}:Object.fromEntries(Object.entries(prev).filter(([k])=>k!==month));
      sset(JOURNAL_PRE+"s_"+buyer.id,next);
      return next;
    });
  },[buyer]);

  if(view==="admin") return <Admin onLogout={()=>setView("gate")}/>;
  if(view==="gate")  return <Gate onBuyer={handleBuyer} onAdmin={()=>setView("admin")}/>;
  if(view==="splash") return <Splash buyer={buyer} entries={entries} onStart={()=>setView("journal")} onLogout={logout}/>;

  return(
    <>
      <Nav page={page} setPage={setPage} saveSt={saveSt} onLogout={logout}/>
      {page==="home"       && <Home       entries={entries} nav={setPage} name={buyer?buyer.name:""} buyer={buyer} onChangePw={()=>{}} onLogout={logout}/>}
      {page==="daily"      && <Daily      entries={entries} onSave={saveEntry} buyer={buyer} onLogout={logout}/>}
      {page==="history"    && <History    entries={entries} buyer={buyer} onLogout={logout}/>}
      {page==="reflection" && <Reflection entries={entries} summaries={summs} onSave={saveSumm} buyer={buyer} onLogout={logout}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
